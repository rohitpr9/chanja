<form class="pt-4" [formGroup]="formGroup" (ngSubmit)="onSubmit()">
  <div formGroupName="customerDetails" class="customer">
    <div
      class="card payment-card"
      *ngFor="let customer of customerDetails.controls; let i = index"
      [class.disabled-customer-bill]="isPaid[i]"
      [formGroupName]="i"
    >
      <div class="card-header payment-card__header">
        <div class="row">
          <div class="col-6">
            <input type="text" class="form-control" formControlName="name" />
          </div>
          <div class="col-6 d-flex align-items-center justify-content-end">
            <span
              *ngIf="isPaid[i]"
              class="payment-card__status payment-card__status--paid "
              >PAID</span
            >
            <span
              *ngIf="!isPaid[i]"
              class="payment-card__status payment-card__status--unpaid "
              >UNPAID</span
            >
          </div>
        </div>
      </div>
      <div class="card-body payment-card__body">
        <div class="row">
          <div class="col-6">
            <label for="items" class="form-label">Items</label>
            <input type="text" class="form-control" />
          </div>
          <div class="col-6">
            <label for="items" class="form-label">No. of items</label>
            <select class="form-select">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <button
              *ngIf="!isPaid[i]"
              class="payment-card__button payment-card--paid"
              (click)="paidByCustomer('paid', i)"
            >
              Paid
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <button
    class="mt-4 border-2 rounded-2"
    style="padding: 2px 10px; background-color: transparent"
    (click)="addCustomer()"
  >
    +
  </button>
</form>
